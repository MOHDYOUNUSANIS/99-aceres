<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .logo {}

        .logo img {
            width: 133px;
        }

        /* section{
            background-image: image-set(https://static.ieplads.com/bmsjs/banners/99acres-hp/1366/1366-banner-1.jpg);
        } */


        nav {
            display: flex;
            width: 100vw;
            height: 30vh;
            justify-content: space-around;
            align-items: center;
            background-image: url(https://static.ieplads.com/bmsjs/banners/99acres-hp/1366/1366-banner-1.jpg);


        }

        .right ul {
            display: flex;
            gap: 35px;
        }

        .right ul li {
            list-style: none;
        }

        .right ul li button {
            margin: 1px;
            padding: 1px;
            background-color: white;
        }

        .right ul li img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>

<body>
    <section>
        <nav>
            <div class="logo">
                <img src="https://static.99acres.com/universalhp/img/nnacres_white_v2.png" alt="">
            </div>
            <div class="right">
                <ul>
                    <li>For Buyers</li>
                    <li>For Tenants</li>
                    <li>For Owners</li>
                    <li>For Dealers / Builders</li>
                    <li>Insights</li>
                    <li><button><span>Post property</span></button></li>
                    <li><img src="/circle-user.png"></li>
                    <li><img src="/user-headset copy.png" alt=""></li>
                    <li>
                        <a class="btn btn-primary" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button"
                            aria-controls="offcanvasExample">
                            <img src="/menu.png" alt="">
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        <main>
            <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample"
                aria-labelledby="offcanvasExampleLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasExampleLabel">Offcanvas</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <div>
                        Some text as placeholder. In real life you can have the elements you have chosen. Like, text,
                        images, lists, etc.
                    </div>
                </div>
            </div>
        </main>
    </section>
    <section>

    </section>

</body>

</html>
